services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432/tcp"
    env_file:
      - config/postgres.env
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql/data
      - type: bind
        source: ./config/init-db.sh
        target: /docker-entrypoint-initdb.d/init-db.sh
        read_only: true

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379/tcp"
    volumes:
      - type: volume
        source: redis-data
        target: /data

  eiu-api:
    image: linkedmink/external-idp-user-api
    build:
      context: .
      target: application
    profiles:
      - deploy
    command: node --enable-source-maps --${INSPECT_TYPE:-inspect}=0.0.0.0:9229 dist/main.js
    ports:
      - "127.0.0.1:3000:3000/tcp"
      - "127.0.0.1:9229:9229/tcp"
    env_file:
      - .env
      - config/api-docker.env
    # volumes:
    #   - type: bind
    #     source: ./config/ca.secp384r1.crt
    #     target: /etc/ssl/certs/ca.secp384r1.crt
    #     read_only: true
    secrets:
      - source: jws-key
        target: jws.secp521r1.key
    depends_on:
      - postgres
      - redis
    develop:
      watch:
        - action: rebuild
          path: src
        - action: rebuild
          path: package-lock.json

  eiu-api-watch:
    image: linkedmink/external-idp-user-api:dev
    build:
      context: .
      target: watch
    profiles:
      - dev
    ports:
      - "127.0.0.1:3000:3000/tcp"
      - "127.0.0.1:9229:9229/tcp"
    env_file:
      - .env
      - config/api-docker.env
    # volumes:
    #   - type: bind
    #     source: ./config/ca.secp384r1.crt
    #     target: /etc/ssl/certs/ca.secp384r1.crt
    #     read_only: true
    secrets:
      - source: jws-key
        target: jws.secp521r1.key
    depends_on:
      - postgres
      - redis
    develop:
      watch:
        - action: sync
          path: ./src
          target: /home/node/app/src
        - action: rebuild
          path: package-lock.json

volumes:
  postgres-data:
  redis-data:

secrets:
  jws-key:
    file: ./config/jws.secp521r1.key
